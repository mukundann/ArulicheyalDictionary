<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Mapped Divya Prabandha Dictionary</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans antialiased text-slate-100 min-h-screen">

    <div class="w-full min-h-screen shadow-2xl flex flex-col relative border-x border-slate-700 mx-auto">
        
        <!-- App Header Section -->
        <header class="bg-gradient-to-b from-amber-700 to-amber-900 text-white px-4 pt-6 pb-4 sticky top-0 z-10 shadow-lg md:px-8">
            <div class="max-w-7xl mx-auto w-full">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-[10px] uppercase tracking-wider text-amber-200 font-bold">Modular Range Engine</span>
                    <span id="counter" class="text-xs bg-amber-950 text-amber-200 px-2.5 py-0.5 rounded-full font-semibold border border-amber-600">Initializing...</span>
                </div>
                <h1 id="appTitle" class="text-xl font-black tracking-tight text-amber-50">Loading Title...</h1>
                <p id="appSubtitle" class="text-xs text-amber-200/70 font-serif italic mb-3">Loading Metadata...</p>
                
                <!-- Inputs & Controls Wrapper Grid -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                    
                    <!-- Real-Time Search Bar Filter (Spans 2 columns on desktop) -->
                    <div class="relative md:col-span-2">
                        <label class="block text-[10px] uppercase font-bold text-amber-200/80 mb-1">Search Database</label>
                        <input 
                            type="text" 
                            id="searchBar" 
                            placeholder="Search or clear to navigate step-by-step..." 
                            class="w-full pl-10 pr-4 py-2 bg-slate-900/90 text-white border border-amber-700/50 rounded-xl shadow-inner text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 placeholder-slate-400"
                            disabled
                        >
                        <div class="absolute left-3 bottom-2.5 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>

                    <!-- Font Adjustment Action Cluster -->
                    <div class="flex items-center justify-between bg-slate-900/60 p-1.5 rounded-xl border border-slate-700/50 h-[38px]">
                        <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400 px-2">Font</span>
                        <div class="flex items-center space-x-1.5">
                            <button id="btnFontDecrease" class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-[11px] text-slate-300 font-bold px-2.5 py-1 rounded-lg border border-slate-600/40 transition-all">A-</button>
                            <button id="btnFontReset" class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-[11px] text-amber-500 font-bold px-2.5 py-1 rounded-lg border border-slate-600/40 transition-all">Reset</button>
                            <button id="btnFontIncrease" class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-[11px] text-slate-300 font-bold px-2.5 py-1 rounded-lg border border-slate-600/40 transition-all">A+</button>
                        </div>
                    </div>

                    <!-- Sequential Navigation Action Cluster -->
                    <div id="navCluster" class="flex items-center justify-between bg-slate-900/60 p-1.5 rounded-xl border border-slate-700/50 h-[38px]">
                        <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400 px-2">Navigate</span>
                        <div class="flex items-center space-x-1.5">
                            <button id="btnPrev" class="bg-slate-800 hover:bg-slate-700 disabled:opacity-30 disabled:pointer-events-none active:scale-95 text-xs text-amber-500 font-black px-3 py-1 rounded-lg border border-slate-600/40 transition-all">◀</button>
                            <button id="btnNext" class="bg-slate-800 hover:bg-slate-700 disabled:opacity-30 disabled:pointer-events-none active:scale-95 text-xs text-amber-500 font-black px-3 py-1 rounded-lg border border-slate-600/40 transition-all">▶</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Engine Container -->
        <main class="flex-1 p-4 md:p-8 overflow-y-auto space-y-4 max-w-7xl mx-auto w-full" id="mainContainer">
            <!-- Error Banner -->
            <div id="errorView" class="hidden border-2 border-dashed border-red-500/50 rounded-2xl p-6 text-center bg-red-950/20 my-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto stroke-red-500 mb-3" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <h3 class="text-sm font-bold text-red-200 mb-1">Engine Initialization Failed</h3>
                <p id="errorText" class="text-xs text-slate-400 max-w-xs mx-auto">Verify file paths configured within your dictionary range rules link up cleanly.</p>
            </div>

            <!-- List of structured dictionary cards inside here -->
            <div id="cardsList" class="space-y-4"></div>
        </main>

        <!-- Status Footer -->
        <footer id="appFooter" class="bg-slate-950 border-t border-slate-800 px-4 py-3 text-center text-[10px] font-mono text-slate-500">
            Decoupled Architecture Online
        </footer>
    </div>

    <!-- External Core Logic Script File -->
   <script type="module" src="app.js"></script>
</body>
</html>
